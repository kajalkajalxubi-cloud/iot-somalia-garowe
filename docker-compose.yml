version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: iot_influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=MasterPassword2026!
      - DOCKER_INFLUXDB_INIT_ORG=GlobalIoT
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
    networks:
      - iot_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: iot_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - influxdb
    networks:
      - iot_network

volumes:
  influxdb_data:
  grafana_data:

networks:
  iot_network:
    driver: bridge
